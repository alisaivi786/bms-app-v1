steps:
  - task: Cache@2
    inputs:
      key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
      path: $(pnpm_config_cache)
    displayName: Cache pnpm

  - script: |
      # corepack enable pnpm
      # corepack prepare pnpm@latest-9 --activate
      npm install -g pnpm@latest-9
      pnpm config set store-dir $(pnpm_config_cache)
    displayName: 'Setup pnpm'

  - script: |
      npm pkg delete dependenciesMeta
      npm pkg delete peerDependenciesMeta
      npm pkg delete devDependenciesMeta
      cat package.json
    displayName: 'Remove Meta from Mobile Package'
    workingDirectory: './packages/libs/mobile'

  - script: pnpm install --no-frozen-lockfile
    displayName: 'Install Dependencies'

  - script: pnpm build-no-cache
    displayName: 'Build all packages'

  - script: pnpm lint
    displayName: 'Linting'
  - script: pnpm test
    displayName: 'Unit Test'
# - script: pnpm pnpm test:cover
#   displayName: 'Unit Test'
